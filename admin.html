<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token中转服务 - 管理后台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .header h1 { color: #1e3c72; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #666; font-size: 16px; }
        
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .status-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .status-card h3 { color: #333; font-size: 18px; margin-bottom: 15px; }
        .status-value {
            font-size: 28px;
            font-weight: bold;
            color: #2a5298;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .status-badge.online {
            background: #10b981;
            color: white;
        }
        .status-badge.offline {
            background: #ef4444;
            color: white;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }
        
        .panel {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .panel h2 {
            color: #333;
            font-size: 22px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            color: #333;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group select:focus,
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2a5298;
        }
        .form-group textarea {
            min-height: 120px;
            font-family: 'Monaco', 'Menlo', monospace;
            resize: vertical;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(42, 82, 152, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn-secondary {
            background: #6b7280;
        }
        
        .result-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        .endpoint-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .endpoint-item {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #2a5298;
        }
        .endpoint-item .method {
            display: inline-block;
            padding: 4px 10px;
            background: #2a5298;
            color: white;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
        }
        .endpoint-item .path {
            color: #333;
            font-family: monospace;
        }
        
        .refresh-btn {
            background: #10b981;
            margin-bottom: 15px;
        }
        
        .nav {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            transition: all 0.3s;
        }
        .nav a:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="index.html">🏠 首页</a>
            <a href="token-relay.html">🔗 Token中转</a>
            <a href="overseas-shipping.html">🚢 海外一件代发</a>
            <a href="http://49.232.79.54:5000/">📊 策略监控</a>
        </nav>
        
        <div class="header">
            <h1>🎛️ Token中转服务 - 管理后台</h1>
            <p>简单易用的API测试和管理界面</p>
        </div>
        
        <div class="status-grid">
            <div class="status-card">
                <h3>服务状态</h3>
                <span class="status-badge offline" id="serviceStatus">检查中...</span>
            </div>
            <div class="status-card">
                <h3>服务地址</h3>
                <div class="status-value" id="serviceUrl">http://127.0.0.1:8080</div>
            </div>
            <div class="status-card">
                <h3>支持服务商</h3>
                <div class="status-value" id="providers">-</div>
            </div>
            <div class="status-card">
                <h3>版本</h3>
                <div class="status-value" id="version">-</div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="panel">
                <h2>🧪 API 测试工具</h2>
                
                <div class="form-group">
                    <label>服务商</label>
                    <select id="provider">
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="zhipu">智谱AI</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>模型</label>
                    <input type="text" id="model" value="gpt-3.5-turbo" placeholder="例如: gpt-3.5-turbo">
                </div>
                
                <div class="form-group">
                    <label>消息内容</label>
                    <textarea id="message">你好，请用一句话介绍一下自己</textarea>
                </div>
                
                <button class="btn" onclick="sendRequest()">🚀 发送请求</button>
                <button class="btn btn-secondary" onclick="refreshStatus()">🔄 刷新状态</button>
                
                <div class="result-box" id="result">
等待发送请求...
                </div>
            </div>
            
            <div class="panel">
                <h2>📚 API 端点</h2>
                <div class="endpoint-list">
                    <div class="endpoint-item">
                        <span class="method">GET</span>
                        <span class="path">/</span>
                        <p style="color: #666; margin-top: 8px; font-size: 13px;">获取服务信息</p>
                    </div>
                    <div class="endpoint-item">
                        <span class="method">GET</span>
                        <span class="path">/health</span>
                        <p style="color: #666; margin-top: 8px; font-size: 13px;">健康检查</p>
                    </div>
                    <div class="endpoint-item">
                        <span class="method">POST</span>
                        <span class="path">/v1/chat/completions</span>
                        <p style="color: #666; margin-top: 8px; font-size: 13px;">Chat对话</p>
                    </div>
                    <div class="endpoint-item">
                        <span class="method">GET/POST</span>
                        <span class="path">/v1/models</span>
                        <p style="color: #666; margin-top: 8px; font-size: 13px;">获取模型列表</p>
                    </div>
                    <div class="endpoint-item">
                        <span class="method">GET/POST</span>
                        <span class="path">/v1/embeddings</span>
                        <p style="color: #666; margin-top: 8px; font-size: 13px;">Embeddings向量</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'http://127.0.0.1:8080';
        
        // 页面加载时检查状态
        window.onload = function() {
            refreshStatus();
        };
        
        // 刷新服务状态
        async function refreshStatus() {
            const statusEl = document.getElementById('serviceStatus');
            const providersEl = document.getElementById('providers');
            const versionEl = document.getElementById('version');
            
            try {
                statusEl.textContent = '检查中...';
                statusEl.className = 'status-badge';
                
                // 检查健康状态
                const healthRes = await fetch(`${BASE_URL}/health`);
                const healthData = await healthRes.json();
                
                // 获取服务信息
                const infoRes = await fetch(`${BASE_URL}/`);
                const infoData = await infoRes.json();
                
                statusEl.textContent = '✅ 在线';
                statusEl.className = 'status-badge online';
                providersEl.textContent = infoData.providers.join(', ');
                versionEl.textContent = infoData.version;
                
            } catch (e) {
                statusEl.textContent = '❌ 离线';
                statusEl.className = 'status-badge offline';
                providersEl.textContent = '-';
                versionEl.textContent = '-';
            }
        }
        
        // 发送请求
        async function sendRequest() {
            const resultEl = document.getElementById('result');
            const provider = document.getElementById('provider').value;
            const model = document.getElementById('model').value;
            const message = document.getElementById('message').value;
            
            resultEl.textContent = '⏳ 发送中...';
            
            try {
                const response = await fetch(`${BASE_URL}/v1/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Provider': provider
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'user', content: message }
                        ]
                    })
                });
                
                const data = await response.json();
                resultEl.textContent = JSON.stringify(data, null, 2);
                
            } catch (e) {
                resultEl.textContent = '❌ 错误: ' + e.message + '\n\n请确保：\n1. Token中转服务已启动\n2. 已配置真实的API密钥';
            }
        }
    </script>
</body>
</html>
